name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        id: pages_deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "mediafairy-aio"
          directory: "."

      - name: Connect Multiple Custom Domains
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOMAINS: ${{ secrets.CUSTOM_DOMAIN }}
        run: |
          npm install -g wrangler
          
          # Mengubah pemisah koma menjadi baris baru dan melakukan perulangan
          for domain in $(echo $DOMAINS | tr "," "\n" | tr " " "\n"); do
            if [ -n "$domain" ]; then
              echo "Memproses domain: $domain"
              npx wrangler pages domain connect mediafairy-aio "$domain" || echo "Domain $domain sudah terhubung atau gagal, lanjut..."
            fi
          done
